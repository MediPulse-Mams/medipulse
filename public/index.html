<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediPulse — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--primary:#0057ff;--primary-lt:#e6eeff;--border:#e4ecf7;--muted:#6b7fa3;--light:#b0bdd4;--text:#0a1628;--bg:#f8fafd;--danger:#ef4444;--danger-bg:#fef2f2;}
html,body{min-height:100vh;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:linear-gradient(135deg,#0a1628 0%,#0d2452 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:#fff;border-radius:24px;padding:40px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.3);}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px;}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,#0057ff,#4d8bff);border-radius:12px;display:grid;place-items:center;}
.logo-icon svg{width:20px;height:20px;stroke:#fff;fill:none;}
.logo-text{font-family:'Playfair Display',serif;font-weight:700;font-size:22px;}
.logo-text em{color:#0057ff;font-style:normal;}
.welcome{text-align:center;margin-bottom:28px;}
.welcome h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:800;margin-bottom:6px;}
.welcome p{color:#6b7fa3;font-size:13px;}
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:600;color:#6b7fa3;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block;}
.form-input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:all .15s;background:var(--bg);}
.form-input:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(0,87,255,.1);}
.form-input::placeholder{color:var(--light);}
.role-select{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--text);outline:none;background:var(--bg);cursor:pointer;}
.role-select:focus{border-color:var(--primary);}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#0057ff,#4d8bff);color:#fff;border:none;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s;margin-top:8px;box-shadow:0 4px 16px rgba(0,87,255,.35);}
.login-btn:hover{transform:translateY(-2px);}
.login-btn:disabled{opacity:.7;cursor:not-allowed;transform:none;}
.error{background:var(--danger-bg);border:1px solid #fca5a5;color:var(--danger);padding:10px 14px;border-radius:8px;font-size:12.5px;font-weight:500;margin-bottom:14px;display:none;text-align:center;}
.footer{text-align:center;margin-top:24px;color:#b0bdd4;font-size:11.5px;}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" stroke-width="2.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    </div>
    <span class="logo-text">Medi<em>Pulse</em></span>
  </div>
  <div class="welcome">
    <h1>Bon retour 👋</h1>
    <p>Connectez-vous à votre espace MediPulse 🇲🇦</p>
  </div>
  <div class="error" id="error-msg"></div>
  <div class="form-group">
    <label class="form-label">Rôle</label>
    <select class="role-select" id="role">
      <option value="owner">👑 Owner / Admin</option>
      <option value="medecin">🏥 Médecin / Cabinet</option>
      <option value="assistante">📋 Assistante</option>
      <option value="commercial">💼 Commercial</option>
    </select>
  </div>
  <div class="form-group">
    <label class="form-label">Email</label>
    <input class="form-input" type="email" id="email" placeholder="votre@email.com">
  </div>
  <div class="form-group">
    <label class="form-label">Mot de passe</label>
    <input class="form-input" type="password" id="password" placeholder="••••••••">
  </div>
  <button class="login-btn" id="login-btn" onclick="login()">Se connecter →</button>
  <div class="footer">MediPulse © 2026 · Maroc 🇲🇦</div>
</div>

<script>
const SUPABASE_URL = 'https://czttvnvcetgmjfqishig.supabase.co';
const SUPABASE_KEY = 'sb_publishable_mRTR9POOteWe_D2YgpucRQ_hMMxNP1m';

const ROLES = {
  'owner@medipulse.ma': 'owner',
  'medecin@medipulse.ma': 'medecin',
  'assistante@medipulse.ma': 'assistante',
  'commercial@medipulse.ma': 'commercial'
};

const REDIRECTS = {
  'owner': '/dashboard-owner.html',
  'medecin': '/dashboard-medecin.html',
  'assistante': '/saisie.html',
  'commercial': '/dashboard-commercial.html'
};

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const role = document.getElementById('role').value;
  const btn = document.getElementById('login-btn');
  const error = document.getElementById('error-msg');

  error.style.display = 'none';

  if(!email || !password) {
    showError('Veuillez remplir tous les champs');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Connexion...';

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if(!res.ok) throw new Error(data.error_description || data.msg || 'Erreur de connexion');

    const roleAttendu = ROLES[email];
    if(!roleAttendu || roleAttendu !== role) {
      throw new Error('Rôle incorrect pour cet email');
    }

    window.location.href = REDIRECTS[role];

  } catch(e) {
    showError(e.message === 'Invalid login credentials' ? 'Email ou mot de passe incorrect' : e.message);
    btn.disabled = false;
    btn.textContent = 'Se connecter →';
  }
}

document.addEventListener('keypress', function(e) {
  if(e.key === 'Enter') login();
});
</script>
</body>
</html>
